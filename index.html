<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的日本打工度假記帳本</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div class="max-w-md mx-auto p-6 bg-white shadow-lg mt-10 rounded-2xl border-t-8 border-red-500">
        <h1 class="text-2xl font-bold text-center mb-2">🇯🇵 打工度假預算追蹤</h1>
        <p class="text-center text-slate-500 mb-6">目標總額：120,000 NTD</p>
        
        <div class="bg-red-50 p-4 rounded-xl mb-6">
            <div class="flex justify-between mb-2">
                <span class="font-medium text-red-700">剩餘預算</span>
                <span class="font-bold text-red-600">120,000 NTD</span>
            </div>
            <div class="w-full bg-red-200 rounded-full h-2.5">
                <div class="bg-red-500 h-2.5 rounded-full" style="width: 100%"></div>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="font-semibold border-b pb-2">新增支出</h2>
            <input type="text" placeholder="項目 (例如：機票)" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-red-400 outline-none">
            <input type="number" placeholder="金額 (NTD)" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-red-400 outline-none">
            <button class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700 transition">
                記錄一筆！
            </button>
        </div>
    </div>
</body>
</html>
